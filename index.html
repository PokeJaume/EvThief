<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de EV Spreads de Smogon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Analizador de EV Spreads de Smogon</h1>
        
        <div class="upload-section">
            <h2>📊 Descargar datos de Smogon</h2>
            <p>Selecciona el periodo y nivel competitivo para analizar los EV spreads</p>
            
            <div class="data-controls">
                <div class="control-group">
                    <label for="monthSelect">📅 Mes/Año:</label>
                    <select id="monthSelect" class="data-select">
                        <option value="2025-05">Mayo 2025</option>
                        <option value="2025-04">Abril 2025</option>
                        <option value="2025-03">Marzo 2025</option>
                        <option value="2025-02">Febrero 2025</option>
                        <option value="2025-01">Enero 2025</option>
                        <option value="2024-12">Diciembre 2024</option>
                        <option value="2024-11">Noviembre 2024</option>
                        <option value="2024-10">Octubre 2024</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="eloSelect">🏆 Nivel ELO:</label>
                    <select id="eloSelect" class="data-select">
                        <option value="1500">1500+ (Principiante)</option>
                        <option value="1630" selected>1630+ (Intermedio)</option>
                        <option value="1750">1750+ (Avanzado)</option>
                    </select>
                </div>
            </div>
            
            <button id="loadDataBtn" class="file-input-button">🚀 Cargar datos de Smogon</button>
            <div id="loadStatus"></div>
        </div>
        
        <div class="search-section">
            <h3>🔎 Buscar EV Spread específico</h3>
            <input type="text" id="searchPokemon" class="search-input" placeholder="Nombre del Pokémon (ej: Urshifu, Rillaboom, etc.)">
            <input type="text" id="searchEVs" class="search-input" placeholder="EVs específicos (ej: 252/0/4/0/0/252 o HP:252,Atk:252)">
            <div class="filter-buttons">
                <button class="filter-btn" onclick="sortBy('usage')">🔥 Ordenar por uso</button>
                <button class="filter-btn" onclick="sortBy('name')">📝 Ordenar por nombre</button>
                <button class="filter-btn" onclick="toggleOnlyPopular()">⭐ Solo populares (>5%)</button>
            </div>
        </div>
        
        <div id="statsummary" class="stats-summary" style="display:none;">
            <h3>📊 Resumen de datos</h3>
            <div class="stat-item">
                <span id="totalPokemon" class="stat-number">0</span>
                <span class="stat-label">Pokémon únicos</span>
            </div>
            <div class="stat-item">
                <span id="totalSpreads" class="stat-number">0</span>
                <span class="stat-label">EV Spreads únicos</span>
            </div>
            <div class="stat-item">
                <span id="avgSpreads" class="stat-number">0</span>
                <span class="stat-label">Promedio por Pokémon</span>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display:none;">Analizando datos</div>
        <div id="error" class="error-message" style="display:none;"></div>
        <div id="results" class="results-section"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
