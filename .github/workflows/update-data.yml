name: Update VGC Data

on:
  schedule:
    - cron: '0 8 2 * *'   # 8:00 UTC on the 2nd of every month
  workflow_dispatch:       # allow manual trigger from the GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and process VGC data
        run: python scripts/download_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — data is already up to date."
          else
            git commit -m "chore: update VGC data for $(date +'%B %Y')"
            git push
          fi
